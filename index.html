<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topic Explainer</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
            background: #f5f5f5;
        }
        h1 { color: #333;}
        input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #4338ca;}
        #result {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: none;
        }
    </style>
</head>
<body>
    <h1>Topic Explainer</h1>
    <input type="text" id="topicInput" placeholder="Enter a topic eg: black holes" />
    <button onclick="explain()">Explain</button>
    <div id="result"></div>
    
    <script>
        async function explain() {
            const topic = document.getElementById("topicInput").value;
            const resultDiv = document.getElementById("result");

            resultDiv.style.display = "block";
            resultDiv.innerText = "Loading..."

            const response = await fetch("https://topic-explainer-ai.onrender.com", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ topic: topic })
            });
            
            const data = await response.json();
            resultDiv.innerText = data.text;
        }
    </script>
</body>
</html>
